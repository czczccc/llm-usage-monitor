name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  windows-build-test:
    runs-on: windows-2022

    env:
      BUILD_TYPE: Debug
      QT_VERSION: 6.8.3
      QT_ARCH: win64_msvc2022_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --no-progress -y
          cmake --version

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          modules: qtcharts
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset msvc-debug -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/logs | Out-Null
          cmake --build --preset build-debug --config $env:BUILD_TYPE -- /m /verbosity:detailed /bl:build/logs/ci-msbuild.binlog

      - name: Test
        shell: pwsh
        run: |
          ctest --preset test-debug --build-config $env:BUILD_TYPE --output-on-failure

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-tree
          path: |
            build/msvc-debug/Testing/**
            build/msvc-debug/CMakeFiles/CMakeOutput.log
            build/msvc-debug/CMakeFiles/CMakeError.log
            build/logs/**
          if-no-files-found: ignore
